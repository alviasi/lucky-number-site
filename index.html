</div>
    background:white;

<h2>Lucky Number Generator</h2>

<input id="n1" placeholder="Enter number 1"><br><br>
<input id="n2" placeholder="Enter number 2"><br><br>
<input id="n3" placeholder="Enter number 3"><br><br>

<button onclick="generate()">Generate Lucky Numbers</button>

<p id="result"></p>

<button onclick="logout()">Logout</button>

<script>

function logout(){
localStorage.removeItem("login");
window.location.href = "login.html";
}

function generate(){

let l1 = parseInt(document.getElementById("n1").value);
let l2 = parseInt(document.getElementById("n2").value);
let l3 = parseInt(document.getElementById("n3").value);

let lucky1 = (l1 - l2) + 57;
let lucky2 = (l2 - l3) + 57;
let lucky3 = lucky2 + 1;

document.getElementById("result").innerHTML =
"Lucky Numbers: " + lucky1 + ", " + lucky2 + ", " + lucky3;

}

</script>
