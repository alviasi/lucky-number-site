<script>

var user = prompt("Enter Password");

    document.body.innerHTML = "<h2>Access Denied</h2>";

<!DOCTYPE html>
<html>
<head>
<title>Lucky Number Generator</title>

<script>
var correctPassword = "786";   //

var user = prompt("Enter Password");

if(user === null || user.trim() === "" || user !== correctPassword){
    document.body.innerHTML = "<h2>Access Denied</h2>";
    throw new Error("Wrong password");
}
</script>

<style>
body{
font-family: Arial;
text-align:center;
background:#f2f6ff;
}

.box{
margin-top:50px;
background:white;
padding:30px;
width:300px;
margin-left:auto;
margin-right:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:80%;
padding:10px;
margin:8px;
}

button{
padding:10px 20px;
background:#2e7dff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>Lucky Number Generator</h1>

<div class="box">

<input type="number" id="n1" placeholder="Enter Number 1"><br>
<input type="number" id="n2" placeholder="Enter Number 2"><br>
<input type="number" id="n3" placeholder="Enter Number 3"><br>

<button onclick="generate()">Generate Lucky Numbers</button>

<div class="result" id="result"></div>

</div>

<script>

function generate(){

let l1 = parseInt(document.getElementById("n1").value);
let l2 = parseInt(document.getElementById("n2").value);
let l3 = parseInt(document.getElementById("n3").value);

let lucky1 = (l1 - l2) + 57;
let lucky2 = (l2 - l3) + 57;
let lucky3 = lucky2 + 1;

document.getElementById("result").innerHTML =
"Lucky Numbers: " + lucky1 + " , " + lucky2 + " , " + lucky3;

}

</script>

</body>
</html>
