<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:100px;
}

input{
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
}
</style>

</head>

<body>

<h2>Enter Password</h2>

<input type="password" id="pass" placeholder="Password">
<br>

<button onclick="check()">Login</button>

<p id="msg"></p>

<script>

function check(){

var password="786";

var user=document.getElementById("pass").value;

if(user===password){

window.location.href="index.html";

}else{

document.getElementById("msg").innerHTML="Wrong Password";

}

}

</script>

</body>
</html>
